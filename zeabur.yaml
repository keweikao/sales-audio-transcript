name: faster-whisper-service

services:
  app:
    type: docker
    dockerfile: Dockerfile
    startCommand: npm start
    
    # 環境變數設定
    environment:
      NODE_ENV: production
      PORT: 3000
      
    # 資源配置 (增加資源以支援 faster-whisper 和 60 分鐘音檔)
    resources:
      memory: 6144 # 6GB 記憶體，支援大型模型和長音檔處理
      cpu: 2000 # 2 CPU 核心，提升處理效能
      
    # 健康檢查
    healthcheck:
      path: /health
      interval: 30s
      timeout: 10s
      retries: 3
      
    # 自動重啟設定
    restart: unless-stopped
    
    # 持續化儲存
    volumes:
      - type: volume
        source: app-data
        target: /app/data
      - type: volume
        source: app-logs
        target: /app/logs
        
    # 網路設定
    ports:
      - 3000:3000
      
    # 依賴服務
    depends_on:
      - redis
      
  # Redis 服務 (用於 Bull Queue)
  redis:
    type: redis
    version: 7
    
    # Redis 配置
    config:
      maxmemory: 256mb
      maxmemory-policy: allkeys-lru
      requirepass: ${REDIS_PASSWORD}
      
    # 持續化儲存
    volumes:
      - type: volume
        source: redis-data
        target: /data
        
# 儲存卷定義        
volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
  redis-data:
    driver: local
    
# 網路設定
networks:
  default:
    driver: bridge